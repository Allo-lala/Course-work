<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Qalb — Smart Islamic Reminder</title>

<link href="https://fonts.googleapis.com/css2?family=Amiri&family=IBM+Plex+Sans&display=swap" rel="stylesheet">
<link rel="stylesheet" href="main.css">
</head>

<body>

<div class="container">

<header>
  <h1>قلب</h1>
  <p class="subtitle">Qalb</p>
</header>

<div class="controls">
  <button onclick="toggleDarkMode()">🌙 Toggle Dark Mode</button>
</div>

<div class="next-banner">
  <p>Time until <span id="next-prayer-name">--</span></p>
  <h2 id="next-prayer-countdown">--:--:--</h2>
</div>

<div id="prayer-grid" class="prayer-grid"></div>

<div class="fasting-card">
  <div class="fasting-header">
    <h2>Fasting Schedule</h2>
    <button id="fasting-toggle" onclick="toggleFasting()" class="toggle-btn inactive">Inactive</button>
  </div>

  <div class="fasting-grid">
    <div id="suhoor-slot" class="fasting-slot disabled">
      <p>Suhoor</p>
      <input type="time" id="suhoor-time" onchange="saveFasting()">
      <div id="suhoor-countdown"></div>
    </div>

    <div id="iftar-slot" class="fasting-slot disabled">
      <p>Iftar</p>
      <input type="time" id="iftar-time" onchange="saveFasting()">
      <div id="iftar-countdown"></div>
    </div>
  </div>
</div>

<footer>Qalb — May your prayers be answered ✦</footer>

</div>

<audio id="adhan-audio" src="https://cdn.islamic.network/audio/adhan/adhan.mp3"></audio>

<script src="main.js"></script>
</body>
</html>
